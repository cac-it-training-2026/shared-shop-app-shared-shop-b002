<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{item}+#{title.detail}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body class="user">

	<h2 th:class="title" th:text="#{item}+#{title.detail}"></h2>

	<div class="info_form_area" th:object="${item}">
		<div class="item_detail_area">
			<div class="item_image_area">
				<img th:if="*{image != null}" th:src="@{/images/{image}(image=*{image})}"></img>
				<img th:if="*{image == null}" th:src="@{/images/common/no_image.jpg}"></img>
			</div>
			<dl class="item_detail_list">
				<dt>[[#{data.item.name}]]</dt>
				<dd th:text="*{name}"></dd>
				<dt>[[#{data.item.price}]]</dt>
				<dd>
					<del th:if="*{discountRate != null}" th:text="*{basePrice}"></del>
					<span th:text="*{price}"></span>
					<span th:if="*{discountRate != null}" style="color:red; font-weight:bold;" th:text="*{discountRate} + '%OFF'"></span>
					<div th:if="*{price > basePrice and stock > 0 and stock < 10}" style="color:red;">残りわずか</div>
				</dd>
				<dt>[[#{data.item.stock}]]</dt>
				<dd th:if="*{stock > 5}" th:text="#{data.in.stock}"></dd>
				<dd th:if="*{stock >= 1 and 5 >= stock }" th:text="*{stock}"></dd>
				<dd th:if="*{stock == 0}" th:text="#{data.out.of.stock}"></dd>
				<dt>[[#{data.category}]]</dt>
				<dd th:text="*{categoryName}"></dd>
				<dt>[[#{data.description}]]</dt>
				<dd th:text="*{description}"></dd>
				<dt>平均評価</dt>
				<dd>
					<span th:text="${averageStar}"></span>
					(<span th:text="${#numbers.formatDecimal(averageRating, 1, 1)}"></span>)
				</dd>
			</dl>
		</div>
		<div class="detail_button_area">
			<form th:action="@{/client/basket/add}" method="post" class="user_info_form" th:if="*{stock > 0}">
				<input type="hidden" th:field="*{id}" />
				<input type="submit" value="買い物かごに入れる" class="send_button" />
			</form>
			<form th:action="@{/client/favorite/add/{itemId}(itemId=*{id})}" method="post" class="user_info_form" th:if="${session.user != null}">
				<input type="submit" th:value="#{favorite.add}" class="send_button" />
			</form>
			<form th:action="@{/client/item/list/1}" method="post">
				<input type="submit" value="戻る" class="back_button" />
			</form>
		</div>
	</div>

	<!-- レビュー表示エリア -->
	<div class="review_area">
		<h3 class="title">レビュー一覧</h3>
		<div th:if="${#lists.isEmpty(reviews)}">
			<p>まだレビューはありません。</p>
		</div>
		<div th:if="!${#lists.isEmpty(reviews)}" th:each="review : ${reviews}" class="review_item">
			<div class="review_header">
				<span class="review_rating" th:text="${review.star}"></span>
				<span class="review_title" th:text="${review.title}"></span>
			</div>
			<div class="review_info">
				<span class="review_user" th:text="'投稿者: ' + ${review.userName}"></span>
				<span class="review_date" th:text="'投稿日: ' + ${review.insertDate}"></span>
			</div>
			<div class="review_content">
				<p th:text="${review.content}"></p>
			</div>
		</div>
	</div>

</body>

</html>
