<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{favorite.title.list} + ' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body class="user">

	<h2 th:class="title" th:text="#{favorite.title.list}"></h2>

	<div th:if="${#lists.isEmpty(favorites)}">
		<p th:text="#{msg.client.favorite.list.none}"></p>
	</div>

	<table th:if="${!#lists.isEmpty(favorites)}" class="list_table">
		<thead>
			<tr>
				<th th:text="#{data.item.name}"></th>
				<th th:text="#{data.item.price}"></th>
				<th th:text="#{data.operate}"></th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="favorite : ${favorites}">
				<td>
					<a th:href="@{/client/item/detail/{id}(id=${favorite.item.id})}" th:text="${favorite.item.name}"></a>
				</td>
				<td th:text="${favorite.item.price}"></td>
				<td>
					<form th:action="@{/client/basket/add}" method="post">
						<input type="hidden" name="id" th:value="${favorite.item.id}" />
						<input type="submit" value="買い物かごに入れる" class="send_button" />
					</form>
					<form th:action="@{/client/favorite/delete/{id}(id=${favorite.id})}" method="post">
						<input type="submit" th:value="#{favorite.delete}" class="delete_button" />
					</form>
				</td>
			</tr>
		</tbody>
	</table>

	<div class="detail_button_area">
		<form th:action="@{/}" method="get">
			<input type="submit" th:value="#{msg.back.to.top}" class="back_button" />
		</form>
	</div>

</body>

</html>
